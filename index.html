<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD2 Party Loadout Randomizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1e2a3a; --bg2: #26354a; --bg3: #2e3f58;
    --border: #3a5070; --border2: #4a6890;
    --gold: #e8e030; --gold2: #f0f060;
    --text: #e8f0f8; --text2: #a0b8d0;
    --accent: #4a7fc0; --accent2: #6a9fd8;
    --success: #3a9060; --tab-active: #2e4870;
    --hp1: #e06030; --hp2: #3a88d8; --hp3: #50a858; --hp4: #a858d8;
  }
  html { font-size: 1.125em; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
  .header { text-align: center; padding: 2rem 1rem 1rem; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 2rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold2); text-shadow: 0 0 20px rgba(232,224,48,0.4); }
  .header .subtitle { font-size: 0.85rem; letter-spacing: 0.3em; color: var(--text2); text-transform: uppercase; margin-top: 0.25rem; }
  .main { padding: 1.5rem 1rem; max-width: 1400px; margin: 0 auto; }
  .party-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  @media (max-width: 900px) { .party-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) { .party-grid { grid-template-columns: 1fr; } }

  .hellpod { background: var(--bg2); border: 1px solid var(--border); overflow: hidden; position: relative; transition: opacity 0.2s; }
  .hellpod.disabled { opacity: 0.4; }
  .hellpod.disabled .hellpod-body { pointer-events: none; user-select: none; }
  .hellpod-disabled-overlay { display: none; position: absolute; inset: 40px 0 0 0; background: rgba(10,14,26,0.55); z-index: 10; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text2); }
  .hellpod.disabled .hellpod-disabled-overlay { display: flex; }

  .hellpod[data-pod="1"] { border-top: 2px solid var(--hp1); }
  .hellpod[data-pod="2"] { border-top: 2px solid var(--hp2); }
  .hellpod[data-pod="3"] { border-top: 2px solid var(--hp3); }
  .hellpod[data-pod="4"] { border-top: 2px solid var(--hp4); }

  .hellpod-header { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); position: relative; z-index: 11; }
  .hellpod-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }
  .hellpod[data-pod="1"] .hellpod-title { color: var(--hp1); }
  .hellpod[data-pod="2"] .hellpod-title { color: var(--hp2); }
  .hellpod[data-pod="3"] .hellpod-title { color: var(--hp3); }
  .hellpod[data-pod="4"] .hellpod-title { color: var(--hp4); }

  .pod-toggle-btn { font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; line-height: 1; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
  .pod-toggle-btn:hover { border-color: var(--gold); color: var(--gold); }
  .hellpod.disabled .pod-toggle-btn { border-color: var(--success); color: var(--success); }

  .pod-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); }
  .pod-tab { flex: 1; font-family: 'Rajdhani', sans-serif; font-size: 0.55rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.4rem 0.1rem; text-align: center; border: none; background: transparent; color: var(--text2); cursor: pointer; border-right: 1px solid var(--border); transition: all 0.15s; }
  .pod-tab:last-child { border-right: none; }
  .pod-tab:hover { color: var(--text); background: var(--bg3); }
  .pod-tab.active { background: var(--tab-active); color: var(--gold); }
  .pod-tab .tab-count { display: block; font-size: 0.45rem; color: var(--text2); margin-top: 1px; }
  .pod-tab.active .tab-count { color: var(--gold2); }

  .pod-panel { display: none; padding: 0.75rem; }
  .pod-panel.active { display: block; }

  .loadout-toggles { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
  .toggle-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; cursor: pointer; }
  .toggle-item input[type="checkbox"] { accent-color: var(--gold); width: 12px; height: 12px; flex-shrink: 0; }

  .weapon-search { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; padding: 0.35rem 0.5rem; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
  .weapon-search:focus { outline: none; border-color: var(--accent); }
  .weapon-category { margin-bottom: 0.4rem; border: 1px solid var(--border); }
  .weapon-category-header { display: flex; align-items: center; justify-content: space-between; padding: 0.3rem 0.5rem; cursor: pointer; background: var(--bg3); user-select: none; }
  .weapon-category-title { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
  .weapon-category-arrow { font-size: 0.6rem; color: var(--text2); transition: transform 0.15s; }
  .weapon-category.open .weapon-category-arrow { transform: rotate(90deg); }
  .weapon-category-body { display: none; padding: 0.3rem 0.5rem; }
  .weapon-category.open .weapon-category-body { display: block; }

  .vehicle-toggles { display: flex; flex-direction: column; gap: 0.3rem; margin-top: 0.4rem; padding: 0.4rem 0.5rem; border: 1px solid var(--border); background: var(--bg3); }
  .vehicle-toggle-label { font-size: 0.65rem; color: var(--text2); letter-spacing: 0.08em; margin-bottom: 0.15rem; text-transform: uppercase; }
  .vehicle-sub-toggles { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .weapon-list { max-height: none; overflow-y: visible; }
  .weapon-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.68rem; padding: 0.15rem 0; cursor: pointer; }
  .weapon-item input[type="checkbox"] { accent-color: var(--gold); width: 11px; height: 11px; flex-shrink: 0; }
  .weapon-item.warbond-locked { opacity: 0.3; cursor: not-allowed; }
  .weapon-item.warbond-locked input { pointer-events: none; }
  .toggle-item.warbond-locked { opacity: 0.3; cursor: not-allowed; }
  .toggle-item.warbond-locked input { pointer-events: none; }
  .select-all-btn { font-family: 'Rajdhani', sans-serif; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 0.15rem 0.4rem; cursor: pointer; }
  .select-all-btn:hover { border-color: var(--gold); color: var(--gold); }

  .warbond-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.35rem; }
  .warbond-btn { font-family: 'Rajdhani', sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 0.4rem 0.5rem; text-align: center; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; color: #fff; }
  .warbond-btn.selected { opacity: 1; }
  .warbond-btn:not(.selected) { opacity: 0.3; filter: grayscale(0.3); }

  .ss-cat-nav { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; }
  .ss-cat-btn { font-family: 'Rajdhani', sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.3rem 0.6rem; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .ss-cat-btn.active { background: var(--gold); border-color: var(--gold2); color: #0a0e1a; }
  .ss-cat-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }
  .ss-cat-panel { display: none; }
  .ss-cat-panel.active { display: block; }

  .loadout-result { border-top: 1px solid var(--border); min-height: 180px; padding: 0.75rem; background: var(--bg); font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; color: var(--text2); }
  .loadout-result.has-result { display: block; }
  .result-section { margin-bottom: 0.6rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 0.4rem; }
  .result-section-content { flex: 1; min-width: 0; }
  .result-label { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text2); margin-bottom: 0.2rem; }
  .result-value { color: var(--gold2); font-size: 0.7rem; line-height: 1.4; }
  .lock-btn { font-size: 0.65rem; background: transparent; border: 1px solid var(--border2); color: var(--text2); cursor: pointer; padding: 0.1rem 0.3rem; flex-shrink: 0; line-height: 1; margin-top: 0.1rem; transition: all 0.15s; margin-left: 0.2rem; }
  .lock-btn:hover { border-color: var(--gold); color: var(--gold); }
  .lock-btn.locked { border-color: var(--gold); color: var(--gold); }
  .preset-panel { margin-bottom: 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
  .preset-list { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.4rem; }
  .preset-btn { font-family: 'Rajdhani', sans-serif; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.25rem 0.6rem; background: transparent; border: 1px solid var(--border2); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .preset-btn:hover { border-color: var(--gold); color: var(--gold); }
  .preset-btn.delete { border-color: #602020; color: #a04040; }
  .preset-btn.delete:hover { border-color: #a04040; color: #c06060; }
  .result-strat { color: var(--accent2); display: block; }
  .question-mark { font-size: 3rem; color: var(--border2); text-align: center; width: 100%; }

  .catchphrase-banner { text-align: center; font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); padding: 0.4rem 1rem; min-height: 1.8rem; }
  .big-randomize-btn { font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.75rem 3rem; background: transparent; border: 2px solid var(--gold); color: var(--gold); cursor: pointer; transition: all 0.2s; }
  .big-randomize-btn:hover { background: var(--gold); color: #0a0e1a; }

  .pod-randomize-btn { font-family: 'Rajdhani', sans-serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.2rem 0.6rem; background: transparent; border: 1px solid var(--border); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .pod-randomize-btn:hover { border-color: var(--gold); color: var(--gold); }

  .sync-bar { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; margin-bottom: 1rem; font-size: 0.72rem; font-family: 'Rajdhani', sans-serif; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .sync-status { display: flex; align-items: center; gap: 0.4rem; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.connected { background: var(--success); }
  .sync-dot.syncing { background: var(--gold); }
  .sync-label { color: var(--text2); letter-spacing: 0.05em; }
  #guaranteed-list label { font-size: 0.75em; }
  .footer { text-align:center; padding: 1.5rem 2rem; color: var(--text2); font-size: 0.75rem; letter-spacing: 0.1em; border-top: 1px solid var(--border); margin-top: 2rem; }
  .room-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 0.72rem; padding: 0.25rem 0.5rem; width: 160px; letter-spacing: 0.05em; }
  .room-input:focus { outline: none; border-color: var(--accent); }
  .sync-btn { font-family: 'Rajdhani', sans-serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.25rem 0.75rem; background: transparent; border: 1px solid var(--border2); color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .sync-btn:hover { border-color: var(--gold); color: var(--gold); }
  .sync-btn.active { border-color: var(--success); color: var(--success); }
  .room-code-display { font-size: 0.65rem; color: var(--text2); letter-spacing: 0.05em; }
</style>

</head>
<body>
<div class="header">
  <h1>Helldivers 2 Loadout Randomizer</h1>
  <div class="subtitle">Mission Planning Console &mdash; Party Edition</div>
</div>
<div class="main">
  <div class="sync-bar" id="sync-bar">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span class="sync-label" id="sync-label">Not connected</span>
    </div>
    <input class="room-input" id="callsign-input" placeholder="Callsign..." autocomplete="off" style="width:100px;" />
    <input class="room-input" id="room-input" placeholder="Room code..." autocomplete="off" />
    <button class="sync-btn" id="sync-btn">Join Room</button>
    <button id="sound-toggle" onclick="toggleSound()" title="Toggle sound" style="background:transparent;border:1px solid var(--border2);color:var(--text);font-size:1rem;padding:0.2rem 0.5rem;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border2)'">🔊</button>
    <span class="room-code-display" id="room-display"></span>
    <span id="player-count" style="font-size:0.7rem;color:var(--text2);letter-spacing:0.05em;margin-left:auto;"></span>
  </div>
  <div class="catchphrase-banner" id="catchphrase-banner"></div>
  <div style="display:flex;align-items:center;gap:1rem;padding:0.5rem 0;margin-bottom:0.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap;">
    <span style="font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text2);">Trait Filters:</span>
    <label class="toggle-item"><input type="checkbox" onchange="toggleTraitFilter('Expendable',this)"> Expendable</label>
    <label class="toggle-item"><input type="checkbox" onchange="toggleTraitFilter('Incendiary',this)"> Incendiary</label>
    <label class="toggle-item"><input type="checkbox" onchange="toggleTraitFilter('Explosive',this)"> Explosive</label>
    <label class="toggle-item"><input type="checkbox" onchange="toggleTraitFilter('Caustic',this)"> Caustic</label>
  </div>
  <div style="margin-bottom:0.75rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;">
    <div style="display:flex;align-items:center;gap:0.75rem;cursor:pointer;padding:0.3rem 0;" onclick="toggleGuaranteedPanel()">
      <span style="font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text2);">Guaranteed Stratagems</span>
      <span id="guaranteed-count" style="font-size:0.6rem;color:var(--gold);"></span>
      <span id="guaranteed-arrow" style="font-size:0.6rem;color:var(--text2);margin-left:auto;">&#9658;</span>
    </div>
    <div id="guaranteed-panel" style="display:none;margin-top:0.4rem;">
      <div style="display:flex;gap:0.3rem;margin-bottom:0.4rem;">
        <button class="select-all-btn" id="gtab-Offensive" onclick="setGuaranteedTab('Offensive')" style="opacity:1;border-color:var(--gold);color:var(--gold);">Offensive</button>
        <button class="select-all-btn" id="gtab-Support" onclick="setGuaranteedTab('Support')">Support</button>
        <button class="select-all-btn" id="gtab-Defensive" onclick="setGuaranteedTab('Defensive')">Defensive</button>
      </div>
      <div id="guaranteed-list" style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.2rem;max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;"></div>
    </div>
  </div>
  <div class="party-grid" id="party-grid"></div>
  <div class="party-controls">
    <button class="big-randomize-btn" onclick="randomizeAll()">&#9654; Randomize All Hellpods</button>
  </div>
</div>
<script>
function downloadApp() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], {type: 'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hd2-party-randomizer.html';
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>

// Active trait filters — unchecked by default (no filtering active)
const traitFilters = { Expendable: false, Incendiary: false, Explosive: false, Caustic: false };

function isItemAllowedByTraits(name) {
  const anyActive = Object.values(traitFilters).some(v => v);
  if (!anyActive) return true; // no filters active = include everything
  const traits = ITEM_TRAITS[name] || [];
  // Only include items that have at least one of the active (checked) traits
  return Object.entries(traitFilters).some(([trait, active]) => active && traits.includes(trait));
}

const HD2_SOUNDS = ["snd-aaah", "snd-super", "snd-getsome1", "snd-affirm", "snd-getsome2", "snd-duty", "snd-stimms", "snd-magempty", "snd-stims2", "snd-democracy"];
let _soundEnabled = true;
function toggleSound() {
  _soundEnabled = !_soundEnabled;
  const btn = document.getElementById('sound-toggle');
  if (btn) btn.textContent = _soundEnabled ? '🔊' : '🔇';
}

let _lastSound = null;
function playRandomSound() {
  if (!_soundEnabled) return;
  let available = HD2_SOUNDS.filter(s => s !== _lastSound);
  const id = available[Math.floor(Math.random() * available.length)];
  _lastSound = id;
  const audio = document.getElementById(id);
  if (audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
}
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

let catchphraseTimer = null;
function flashCatchphrase() {
  const banner = document.getElementById('catchphrase-banner');
  if (!banner) return;
  banner.textContent = CATCHPHRASES[Math.floor(Math.random() * CATCHPHRASES.length)];
}
function randFiltered(arr, checks) {
  const enabled = arr.filter((_, i) => checks[i] !== false);
  return enabled.length ? rand(enabled) : rand(arr);
}

function initPodState() {
  const weaponChecks = {};
  Object.keys(DATA).forEach(cat => { weaponChecks[cat] = DATA[cat].map(() => true); });
  // Vehicles start unchecked — lock all vehicle items by default
  DATA.vehicle.forEach((_, i) => { weaponChecks.vehicle[i] = false; });
  return {
    disabled: false,
    loadout: Object.fromEntries(LOADOUT_CATS.map(c => [c, true])),
    vehicles: { exosuits: false, frvs: false, other: false },
    atLeastOne: false,
    weapons: weaponChecks,
    warbonds: Object.fromEntries(WARBONDS.map(w => [w.id, true])),
    superstore: {
      primary: SUPERSTORE.primary.map(() => false),
      secondary: SUPERSTORE.secondary.map(() => false),
      armor: SUPERSTORE.armor.map(() => false),
      bonus: SUPERSTORE.bonus.map(() => false),
      throwables: SUPERSTORE.throwables.map(() => false)
    }
  };
}

function switchTab(podId, tab, btn) {
  const tabs = btn.closest('.pod-tabs');
  const body = document.getElementById('pod-body-' + podId);
  const panel = document.getElementById('panel-' + podId + '-' + tab);
  const isActive = btn.classList.contains('active');

  // Deactivate all tabs and hide all panels
  tabs.querySelectorAll('.pod-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll(`#panel-${podId}-loadout, #panel-${podId}-weapons, #panel-${podId}-warbonds, #panel-${podId}-superstore`)
    .forEach(p => p.classList.remove('active'));

  if (isActive) {
    // Clicking the active tab collapses it
    if (body) body.style.display = 'none';
  } else {
    // Clicking a different or collapsed tab opens it
    if (body) body.style.display = '';
    btn.classList.add('active');
    if (panel) panel.classList.add('active');
  }
}

function switchSsCat(podId, cat, btn) {
  const panel = document.getElementById('panel-' + podId + '-superstore');
  panel.querySelectorAll('.ss-cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  panel.querySelectorAll('.ss-cat-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('ss-' + podId + '-' + cat).classList.add('active');
}

function toggleWeaponSection(podId, key) {

}

function toggleAtLeastOne(podId, cb) {
  podStates[podId].atLeastOne = cb.checked;
}

function toggleVehicle(podId, subType, cb) {
  podStates[podId].vehicles[subType] = cb.checked;
  VEHICLE_ITEMS[subType].forEach(itemName => lockItemByName(podId, itemName, !cb.checked));

function toggleSsItem(podId, cat, idx, cb) { podStates[podId].superstore[cat][idx] = cb.checked; claimPod(podId); }

// Warbond presets — stored in localStorage
function loadPresets() { try { return JSON.parse(localStorage.getItem('hd2_presets') || '{}'); } catch { return {}; } }
function savePresetsToStorage(presets) { localStorage.setItem('hd2_presets', JSON.stringify(presets)); }

function renderPresetList(podId) {
  const presets = loadPresets();
  const list = document.getElementById('preset-list-' + podId);
  if (!list) return;
  const names = Object.keys(presets);
  if (!names.length) { list.innerHTML = '<span style="font-size:0.65rem;color:var(--text2);">No presets saved.</span>'; return; }
  list.innerHTML = `
    <div style="display:flex;align-items:center;gap:0.4rem;margin-top:0.2rem;">
      <select id="preset-select-${podId}" onchange="loadSelectedPreset(${podId})" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:0.72rem;padding:0.25rem 0.4rem;flex:1;">
        <option value="">— Select preset —</option>
        ${names.map(n => `<option value="${n.replace(/"/g,'&quot;')}">${n}</option>`).join('')}
      </select>
      <button class="select-all-btn" onclick="updateSelectedPreset(${podId})" title="Update selected preset">Update</button>
      <button onclick="deleteSelectedPreset(${podId})" title="Delete preset" style="background:transparent;border:none;cursor:pointer;font-size:1.1rem;padding:0.1rem 0.2rem;color:var(--text2);" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text2)'"><i class="bi bi-trash"></i></button>
    </div>`;
}

function updateSelectedPreset(podId) {
  const sel = document.getElementById('preset-select-' + podId);
  if (!sel || !sel.value) return;
  const name = sel.value;
  const presets = loadPresets();
  presets[name] = {...podStates[podId].warbonds};
  savePresetsToStorage(presets);
  for (let i = 1; i <= 4; i++) renderPresetList(i);
  // Re-select the updated preset in this pod's dropdown
  const thisSel = document.getElementById('preset-select-' + podId);
  if (thisSel) thisSel.value = name;
}

function savePreset(podId) {
  const input = document.getElementById('preset-name-' + podId);
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  const presets = loadPresets();
  presets[name] = {...podStates[podId].warbonds};
  savePresetsToStorage(presets);
  input.value = '';
  for (let i = 1; i <= 4; i++) renderPresetList(i);
  const thisSel = document.getElementById('preset-select-' + podId);
  if (thisSel) thisSel.value = name;
}

function loadSelectedPreset(podId) {
  const sel = document.getElementById('preset-select-' + podId);
  if (!sel) return;
  if (!sel.value) {
    selectAllWarbonds(podId);
    return;
  }
  loadPreset(sel.value, podId);
}

function deleteSelectedPreset(podId) {
  const sel = document.getElementById('preset-select-' + podId);
  if (!sel || !sel.value) return;
  const name = sel.value;
  if (!confirm(`Delete preset "${name}"?`)) return;
  deletePreset(name, podId);
  // If no presets remain, select all warbonds
  const remaining = Object.keys(loadPresets());
  if (!remaining.length) selectAllWarbonds(podId);
}

function loadPreset(name, podId) {
  const presets = loadPresets();
  const saved = presets[name];
  if (!saved) return;
  const panel = document.getElementById('panel-' + podId + '-warbonds');
  if (!panel) return;
  const btns = panel.querySelectorAll('.warbond-btn');
  btns.forEach((btn, idx) => {
    const wbId = WARBONDS[idx].id;
    const nowSelected = saved[wbId] !== false;
    if (podStates[podId].warbonds[wbId] === nowSelected) return;
    podStates[podId].warbonds[wbId] = nowSelected;
    btn.classList.toggle('selected', nowSelected);
    const affectedItems = WARBOND_ITEMS[wbId] || [];
    affectedItems.forEach(itemName => lockItemByName(podId, itemName, !nowSelected));
  });
  updateTabCounts(podId);
  if (window.syncWarbonds) window.syncWarbonds(podId);
  claimPod(podId);
  if (document.getElementById("guaranteed-panel")?.style.display !== "none") buildGuaranteedList();
}

function deletePreset(name, podId) {
  const presets = loadPresets();
  delete presets[name];
  savePresetsToStorage(presets);
  for (let i = 1; i <= 4; i++) renderPresetList(i);
}

function toggleTraitFilter(trait, cb) {
  traitFilters[trait] = cb.checked;
}

// Guaranteed stratagems organized by category
const GUARANTEED_CATEGORIES = {
  Offensive: [...DATA.offensive].sort(),
  Support:   [...DATA.support].sort(),
  Defensive: [...DATA.defensive].sort()
};

let currentGuaranteedTab = 'Offensive';
const guaranteedStratagems = new Set();

// Build reverse lookup: stratagem name -> warbond ID
const STRAT_TO_WARBOND = {};
Object.entries(WARBOND_ITEMS).forEach(([wbId, items]) => {
  items.forEach(item => { STRAT_TO_WARBOND[item] = wbId; });
});

// Check if a stratagem is available in at least one active hellpod's warbonds
function isStratAvailable(name) {
  const wbId = STRAT_TO_WARBOND[name];
  if (!wbId) return true; // base game item, always available
  // Available if any active (non-disabled) hellpod has this warbond selected
  for (let i = 1; i <= 4; i++) {
    if (!podStates[i].disabled && podStates[i].warbonds[wbId]) return true;
  }
  return false;
}

function buildGuaranteedList() {
  const list = document.getElementById('guaranteed-list');
  const items = GUARANTEED_CATEGORIES[currentGuaranteedTab] || [];
  // Remove any selected stratagems that are no longer available
  guaranteedStratagems.forEach(name => {
    if (!isStratAvailable(name)) {
      guaranteedStratagems.delete(name);
    }
  });
  const count = guaranteedStratagems.size;
  const countEl = document.getElementById('guaranteed-count');
  if (countEl) countEl.textContent = count ? `(${count} selected)` : '';

  list.innerHTML = items.map(name => {
    const available = isStratAvailable(name);
    const isChecked = guaranteedStratagems.has(name);
    return `<label class="toggle-item${available ? '' : ' warbond-locked'}">
      <input type="checkbox" ${isChecked ? 'checked' : ''} ${available ? '' : 'disabled'} onchange="toggleGuaranteed('${name.replace(/'/g,"\\'")}',this)"> ${name}
    </label>`;
  }).join('');
}

function setGuaranteedTab(tab) {
  currentGuaranteedTab = tab;
  ['Offensive','Support','Defensive'].forEach(t => {
    const btn = document.getElementById('gtab-' + t);
    if (btn) {
      btn.style.opacity = t === tab ? '1' : '';
      btn.style.borderColor = t === tab ? 'var(--gold)' : '';
      btn.style.color = t === tab ? 'var(--gold)' : '';
    }
  });
  buildGuaranteedList();
}

function toggleGuaranteedPanel() {
  const panel = document.getElementById('guaranteed-panel');
  const arrow = document.getElementById('guaranteed-arrow');
  const open = panel.style.display === 'none';
  panel.style.display = open ? '' : 'none';
  arrow.innerHTML = open ? '&#9660;' : '&#9658;';
  if (open) buildGuaranteedList();
}

function toggleGuaranteed(name, cb) {
  if (cb.checked) guaranteedStratagems.add(name);
  else guaranteedStratagems.delete(name);
  const count = guaranteedStratagems.size;
  document.getElementById('guaranteed-count').textContent = count ? `(${count} selected)` : '';
}

function toggleAllLoadout(podId, btn) {
  const panel = document.getElementById('panel-' + podId + '-loadout');
  const boxes = panel.querySelectorAll('.loadout-toggles input[type="checkbox"]');
  const anyUnchecked = Array.from(boxes).some(b => !b.checked);
  boxes.forEach(b => {
    b.checked = anyUnchecked;
    const cat = b.closest('.toggle-item').textContent.trim();
    podStates[podId].loadout[cat] = anyUnchecked;
  });
  updateTabCounts(podId);
}

// Track current claims: podId -> callsign
const currentClaims = {1: '', 2: '', 3: '', 4: ''};

function claimPod(podId) {
  const callsign = document.getElementById('callsign-input')?.value.trim() || localStorage.getItem('hd2_callsign') || 'Helldiver';
  // Unassign from any other pod this user currently claims
  for (let i = 1; i <= 4; i++) {
    if (i !== podId && currentClaims[i] === callsign) {
      deassignPod(i);
    }
  }
  currentClaims[podId] = callsign;
  updateClaimDisplay(podId, callsign);
  if (window.syncClaim) window.syncClaim(podId);
}

function selectAllWarbonds(podId) {
  const panel = document.getElementById('panel-' + podId + '-warbonds');
  if (!panel) return;
  const btns = panel.querySelectorAll('.warbond-btn');
  btns.forEach((btn, idx) => {
    const wbId = WARBONDS[idx].id;
    podStates[podId].warbonds[wbId] = true;
    btn.classList.add('selected');
    (WARBOND_ITEMS[wbId] || []).forEach(itemName => lockItemByName(podId, itemName, false));
  });
  updateTabCounts(podId);
  if (window.syncWarbonds) window.syncWarbonds(podId);
  if (document.getElementById("guaranteed-panel")?.style.display !== "none") buildGuaranteedList();
}

function deassignPod(podId) {
  currentClaims[podId] = '';
  updateClaimDisplay(podId, '');
  // Reset preset dropdown and restore all warbonds
  const presetSel = document.getElementById('preset-select-' + podId);
  if (presetSel) presetSel.value = '';
  selectAllWarbonds(podId);
  if (window.syncClaim) window.syncClaim(podId, true);
}

function assignPod(podId) {
  const sel = document.getElementById('assign-select-' + podId);
  if (!sel || !sel.value) return;
  const callsign = sel.value;
  // Unassign this person from any other pod they currently hold
  for (let i = 1; i <= 4; i++) {
    if (i !== podId && currentClaims[i] === callsign) {
      deassignPod(i);
    }
  }
  currentClaims[podId] = callsign;
  updateClaimDisplay(podId, callsign);
  if (window.syncClaim) window.syncClaim(podId, false, callsign);
  sel.value = '';
}

function updateClaimDisplay(podId, callsign) {
  const el = document.getElementById('claim-' + podId);
  const btn = document.getElementById('claim-btn-' + podId);
  if (el) el.textContent = callsign ? '· ' + callsign : '';
  if (btn) btn.style.display = callsign ? 'none' : '';
}

// Update all assign dropdowns with current room users
function updateAssignDropdowns(users) {
  for (let i = 1; i <= 4; i++) {
    const sel = document.getElementById('assign-select-' + i);
    if (!sel) continue;
    const current = sel.value;
    sel.innerHTML = '<option value="">Assign...</option>' +
      users.map(u => `<option value="${u}">${u}</option>`).join('');
    if (current && users.includes(current)) sel.value = current;
  }
}

function toggleLoadout(podId, cat, cb) { podStates[podId].loadout[cat] = cb.checked; updateTabCounts(podId); claimPod(podId); }
function toggleWeapon(podId, cat, idx, cb) { podStates[podId].weapons[cat][idx] = cb.checked; updateTabCounts(podId); claimPod(podId); }
function lockItemByName(podId, itemName, lock) {
  const weaponPanel = document.getElementById('weapon-sections-' + podId);
  weaponPanel.querySelectorAll('.weapon-item').forEach(item => {
    if (item.textContent.trim() !== itemName) return;
    item.classList.toggle('warbond-locked', lock);
    const cb = item.querySelector('input');
    cb.disabled = lock;
    cb.checked = !lock;
    // Find which DATA category this item belongs to and its index
    for (const [cat, arr] of Object.entries(DATA)) {
      const idx = arr.indexOf(itemName);
      if (idx !== -1) {
        podStates[podId].weapons[cat][idx] = !lock;
        break;
      }
    }
    // Also check booster DATA key separately (same as above but belt-and-suspenders)
  });
}

function toggleWarbond(podId, wbId, btn) {
  const nowSelected = !podStates[podId].warbonds[wbId];
  podStates[podId].warbonds[wbId] = nowSelected;
  btn.classList.toggle('selected', nowSelected);

  const affectedItems = WARBOND_ITEMS[wbId] || [];
  affectedItems.forEach(itemName => lockItemByName(podId, itemName, !nowSelected));
  updateTabCounts(podId);
  if (window.syncWarbonds) window.syncWarbonds(podId);
  claimPod(podId);
  if (document.getElementById("guaranteed-panel")?.style.display !== "none") buildGuaranteedList();
}

function toggleAllWarbonds(podId, btn) {
  const panel = document.getElementById('panel-' + podId + '-warbonds');
  const btns = panel.querySelectorAll('.warbond-btn');
  const anyDeselected = Array.from(btns).some(b => !b.classList.contains('selected'));
  const nowSelected = anyDeselected;

  btns.forEach((b, idx) => {
    podStates[podId].warbonds[WARBONDS[idx].id] = nowSelected;
    b.classList.toggle('selected', nowSelected);
  });

  // Lock or unlock every warbond item
  Object.values(WARBOND_ITEMS).flat().forEach(itemName => {
    lockItemByName(podId, itemName, !nowSelected);
  });
  updateTabCounts(podId);
  if (window.syncWarbonds) window.syncWarbonds(podId);
  claimPod(podId);
}

function toggleAllWeapons(podId, cat, btn) {
  const container = document.getElementById('wl-' + podId + '-' + cat);
  const boxes = container.querySelectorAll('input[type="checkbox"]');
  const anyUnchecked = Array.from(boxes).some(b => !b.checked && !b.disabled);
  boxes.forEach(b => {
    if (b.disabled) return; // don't touch warbond-locked items
    b.checked = anyUnchecked;
    const itemName = b.closest('.weapon-item').textContent.trim();
    const idx = DATA[cat].indexOf(itemName);
    if (idx !== -1) podStates[podId].weapons[cat][idx] = anyUnchecked;
  });
  updateTabCounts(podId);
}

function toggleAllSsItems(podId, cat, btn) {
  // For weapons tab, toggle both primary and secondary
  const keys = cat === 'weapons' ? ['primary','secondary'] : [cat];
  const container = document.getElementById('ss-' + podId + '-' + cat);
  const boxes = container.querySelectorAll('input[type="checkbox"]');
  const anyUnchecked = Array.from(boxes).some(b => !b.checked);
  boxes.forEach(b => {
    b.checked = anyUnchecked;
    const itemName = b.closest('.weapon-item').textContent.trim();
    for (const k of keys) {
      const idx = (SUPERSTORE[k] || []).indexOf(itemName);
      if (idx !== -1) podStates[podId].superstore[k][idx] = anyUnchecked;
    }
  });
}

function updateTabCounts(podId) {
  const state = podStates[podId];
  const container = document.getElementById('panel-' + podId + '-loadout').closest('.hellpod');
  if (!container) return;
  const tabs = container.querySelectorAll('.pod-tab');
  const lc = Object.values(state.loadout).filter(Boolean).length;
  const wc = Object.values(state.weapons).flat().filter(v => v !== false).length;
  const totalW = Object.values(DATA).flat().length;
  const wb = Object.values(state.warbonds).filter(Boolean).length;
  if (tabs[0]) tabs[0].querySelector('.tab-count').textContent = lc + '/' + LOADOUT_CATS.length;
  if (tabs[1]) tabs[1].querySelector('.tab-count').textContent = wc + '/' + totalW;
  if (tabs[2]) tabs[2].querySelector('.tab-count').textContent = wb + '/' + WARBONDS.length;
}

function searchWeapons(podId, query) {
  const q = query.toLowerCase();
  const container = document.getElementById('weapon-sections-' + podId);
  container.querySelectorAll('.weapon-item').forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
  container.querySelectorAll('.weapon-category').forEach(cat => {
    const visible = Array.from(cat.querySelectorAll('.weapon-item')).some(i => i.style.display !== 'none');
    cat.style.display = visible ? '' : 'none';
    if (q && visible) cat.classList.add('open');
    else if (!q) cat.classList.remove('open');
  });
}

function generateLoadout(podId, guaranteed = [], locked = new Set(), prevResult = null) {
  const state = podStates[podId];
  const l = state.loadout;
  const w = state.weapons;
  const ss = state.superstore;

  // Filter every pool through weapons state so locked/unchecked items are excluded
  // Deduplicate pools so superstore items that also appear in DATA don't get double weight
  const enabledPrimary = new Set(DATA.primary.filter((_, i) => w.primary[i] !== false));
  SUPERSTORE.primary.forEach((item, i) => { if (ss.primary[i]) enabledPrimary.add(item); });
  const primaryPool = [...enabledPrimary];

  const secondaryPool = [
    ...DATA.secondary.filter((_, i) => w.secondary[i] !== false),
    ...SUPERSTORE.secondary.filter((_, i) => ss.secondary[i])
  ];
  const throwablePool = [
    ...DATA.throwable.filter((_, i) => w.throwable[i] !== false),
    ...SUPERSTORE.throwables.filter((_, i) => ss.throwables[i])
  ];

  const enabledArmor = new Set(DATA.armor.filter((_, i) => w.armor[i] !== false));
  SUPERSTORE.armor.forEach((item, i) => { if (ss.armor[i]) enabledArmor.add(item); });
  SUPERSTORE.bonus.forEach((item, i) => { if (ss.bonus[i]) enabledArmor.add(item); });
  const armorPool = [...enabledArmor];
  const vehiclePool = [
    ...(state.vehicles.exosuits ? VEHICLE_ITEMS.exosuits : []),
    ...(state.vehicles.frvs ? VEHICLE_ITEMS.frvs : []),
    ...(state.vehicles.other ? VEHICLE_ITEMS.other : [])
  ].filter(isItemAllowedByTraits);
  const offensivePool = DATA.offensive.filter((_, i) => w.offensive[i] !== false).filter(isItemAllowedByTraits);
  const defensivePool = DATA.defensive.filter((_, i) => w.defensive[i] !== false).filter(isItemAllowedByTraits);
  const supportPool   = DATA.support.filter((_, i) => w.support[i] !== false).filter(isItemAllowedByTraits);
  const backpackPool  = DATA.backpack.filter((_, i) => w.backpack[i] !== false).filter(isItemAllowedByTraits);
  const boosterPool   = DATA.booster.filter((_, i) => w.booster[i] !== false);

  const result = {};

  else if (l['Secondary'] && secondaryPool.length)      result.secondary = rand(secondaryPool);
  if (locked.has('throwable') && prevResult?.throwable) result.throwable = prevResult.throwable;
  else if (l['Throwable'] && throwablePool.length)      result.throwable = rand(throwablePool);
  if (locked.has('armor') && prevResult?.armor)         result.armor     = prevResult.armor;
  else if (l['Armor']     && armorPool.length)          result.armor     = rand(armorPool);
  // Start with guaranteed stratagems for this pod (pre-assigned by randomizeAll)
  const strats = locked.has('stratagems') && prevResult?.stratagems ? [...prevResult.stratagems] : [...guaranteed];
  const used = new Set(strats);
  let backpackUsed = strats.some(s => STRAT_POOL_LABEL[s] === 'Backpack' || SUPPORT_WITH_BACKPACK.has(s));
  // Track non-expendable support weapon usage (max 1 per loadout)
  const isNonExpendableSupport = s => STRAT_POOL_LABEL[s] === 'Support' && !EXPENDABLE_SUPPORT.has(s);
  let supportWeaponUsed = strats.some(s => isNonExpendableSupport(s));

  if (state.atLeastOne) {
    const supportPlusVehiclesBackpacks = [...supportPool, ...backpackPool];
    const guaranteedPools = [offensivePool, defensivePool, supportPlusVehiclesBackpacks].filter(p => p.length);
    for (const pool of guaranteedPools) {
      if (strats.length >= 4) break;
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      for (const item of shuffled) {
        if (used.has(item)) continue;
        const isBackpack = STRAT_POOL_LABEL[item] === 'Backpack';
        const includesBackpack = SUPPORT_WITH_BACKPACK.has(item);
        if ((isBackpack || includesBackpack) && backpackUsed) continue;
        if (isNonExpendableSupport(item) && supportWeaponUsed) continue;
        if (isBackpack || includesBackpack) backpackUsed = true;
        if (isNonExpendableSupport(item)) supportWeaponUsed = true;
        used.add(item); strats.push(item); break;
      }
    }
    if (strats.length < 4) {
      const combined = [...offensivePool, ...defensivePool, ...supportPlusVehiclesBackpacks]
        .filter(item => !used.has(item)).sort(() => Math.random() - 0.5);
      for (const item of combined) {
        if (strats.length >= 4) break;
        const isBackpack = STRAT_POOL_LABEL[item] === 'Backpack';
        const includesBackpack = SUPPORT_WITH_BACKPACK.has(item);
        if ((isBackpack || includesBackpack) && backpackUsed) continue;
        if (isNonExpendableSupport(item) && supportWeaponUsed) continue;
        if (isBackpack || includesBackpack) backpackUsed = true;
        if (isNonExpendableSupport(item)) supportWeaponUsed = true;
        used.add(item); strats.push(item);
      }
    }
  } else {
    const stratPool = [];
    if (l['Offensive']) offensivePool.forEach(i => stratPool.push(i));
    if (l['Defensive']) defensivePool.forEach(i => stratPool.push(i));
    if (l['Support'])   supportPool.forEach(i => stratPool.push(i));
    if (l['Backpack'])  backpackPool.forEach(i => stratPool.push(i));
    vehiclePool.forEach(i => stratPool.push(i));
    for (const item of stratPool.sort(() => Math.random() - 0.5)) {
      if (strats.length >= 4) break;
      if (used.has(item)) continue;
      const isBackpack = STRAT_POOL_LABEL[item] === 'Backpack';
      const includesBackpack = SUPPORT_WITH_BACKPACK.has(item);
      if ((isBackpack || includesBackpack) && backpackUsed) continue;
      if (isNonExpendableSupport(item) && supportWeaponUsed) continue;
      if (isBackpack || includesBackpack) backpackUsed = true;
      if (isNonExpendableSupport(item)) supportWeaponUsed = true;
      used.add(item); strats.push(item);
    }
  }

  if (strats.length) result.stratagems = strats;

  if (locked.has('booster') && prevResult?.booster) result.booster = prevResult.booster;
  else if (l['Booster'] && boosterPool.length) result.booster = rand(boosterPool);

}

// Track locked slots per pod

function rerollSection(podId, slot) {
  if (podStates[podId].disabled || !lastResults[podId]) return;
  if (lockedSlots[podId].has(slot)) return; // slot is locked
  const state = podStates[podId];
  const w = state.weapons;

  if (slot === 'primary') {

    const supportPool   = DATA.support.filter((_, i) => w.support[i] !== false).filter(isItemAllowedByTraits);
    const backpackPool  = DATA.backpack.filter((_, i) => w.backpack[i] !== false).filter(isItemAllowedByTraits);
    const l = state.loadout;
    const strats = [];
    const isNES = s => STRAT_POOL_LABEL[s] === 'Support' && !EXPENDABLE_SUPPORT.has(s);
    if (state.atLeastOne) {
      const supportPlusVehiclesBackpacks = [...supportPool, ...backpackPool];
      const guaranteedPools = [offensivePool, defensivePool, supportPlusVehiclesBackpacks].filter(p => p.length);
      const used = new Set();

        for (const item of shuffled) {
          if (used.has(item)) continue;

          const includesBackpack = SUPPORT_WITH_BACKPACK.has(item);
          if ((isBackpack || includesBackpack) && backpackUsed) continue;
          if (isNES(item) && supportWeaponUsed) continue;
          if (isBackpack || includesBackpack) backpackUsed = true;
          if (isNES(item)) supportWeaponUsed = true;
          used.add(item); strats.push(item); break;
        }
      }
      if (strats.length < 4) {
        const combined = [...offensivePool, ...defensivePool, ...supportPlusVehiclesBackpacks]
          .filter(item => !used.has(item)).sort(() => Math.random() - 0.5);
        for (const item of combined) {
          if (strats.length >= 4) break;
          if (used.has(item)) continue;
          const isBackpack = STRAT_POOL_LABEL[item] === 'Backpack';
          const includesBackpack = SUPPORT_WITH_BACKPACK.has(item);
          if ((isBackpack || includesBackpack) && backpackUsed) continue;
          if (isNES(item) && supportWeaponUsed) continue;
          if (isBackpack || includesBackpack) backpackUsed = true;
          if (isNES(item)) supportWeaponUsed = true;
          used.add(item); strats.push(item);
        }
      }
    } else {

      if (l['Offensive']) offensivePool.forEach(i => stratPool.push(i));
      if (l['Defensive']) defensivePool.forEach(i => stratPool.push(i));
      if (l['Support'])   supportPool.forEach(i => stratPool.push(i));
      if (l['Backpack'])  backpackPool.forEach(i => stratPool.push(i));
      vehiclePool.forEach(i => stratPool.push(i));
      let backpackUsed = false;
      let supportWeaponUsed = false;
      const seen = new Set();
      for (const item of stratPool.sort(() => Math.random() - 0.5)) {
        if (seen.has(item)) continue;
        const isBackpack = STRAT_POOL_LABEL[item] === 'Backpack';

  } else if (slot === 'booster') {

  const input = document.getElementById('room-input');

        podStates[i].disabled = data[i];
      }

  });

  const unsubWarbonds = onValue(warbandsRef, snapshot => {
    if (isReceiving) return;
    const data = snapshot.val();
    if (!data) return;
    isReceiving = true;
    for (let i = 1; i <= 4; i++) {

window.syncClaim = function(podId, clear = false, callsign = null) {
  if (!currentRoom) return;
  const name = clear ? null : (callsign || document.getElementById('callsign-input')?.value.trim() || localStorage.getItem('hd2_callsign') || 'Helldiver');
  set(ref(db, 'rooms/' + currentRoom + '/claims/' + podId), name);
};

window.syncWarbonds = function(podId) {
  if (!currentRoom) return;
  touchActivity();
  set(ref(db, 'rooms/' + currentRoom + '/warbonds/' + podId), podStates[podId].warbonds);
};

// Wire up sync bar events after module loads
document.getElementById('room-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.joinRoom(); });
document.getElementById('callsign-input').addEventListener('keydown', e => { if (e.key === 'Enter') window.joinRoom(); });
document.getElementById('sync-btn').onclick = window.joinRoom;

// Restore saved callsign
const savedCallsign = localStorage.getItem('hd2_callsign');
if (savedCallsign) document.getElementById('callsign-input').value = savedCallsign;

// ── Stale state cleanup ────────────────────────────────────────────────────
// On page load, remove any room state keys older than 1 week
(function cleanupStaleRoomState() {
  const ONE_WEEK = 7 * 24 * 60 * 60 * 1000;
  for (const key of Object.keys(localStorage)) {
    if (!key.startsWith('hd2_state_')) continue;
    try {
      const data = JSON.parse(localStorage.getItem(key));
      if (!data.savedAt || Date.now() - data.savedAt > ONE_WEEK) {
        localStorage.removeItem(key);
      }
    } catch {
      localStorage.removeItem(key); // corrupt entry, remove it
    }
  }
})();

// ── State persistence ──────────────────────────────────────────────────────
// Save all local pod state to localStorage so it survives mobile screen sleep
function saveLocalState() {
  if (!currentRoom) return;
  // Save preset dropdown selections per pod
  const presetSelections = {};
  for (let i = 1; i <= 4; i++) {
    const sel = document.getElementById('preset-select-' + i);
    if (sel) presetSelections[i] = sel.value || '';
  }
  const snapshot = {
    savedAt: Date.now(),
    podStates: JSON.parse(JSON.stringify(podStates)),
    lastResults,
    lockedSlots: {
      1: [...lockedSlots[1]], 2: [...lockedSlots[2]],
      3: [...lockedSlots[3]], 4: [...lockedSlots[4]]
    },
    currentClaims,
    traitFilters,
    guaranteedStratagems: [...guaranteedStratagems],
    presetSelections
  };
  localStorage.setItem('hd2_state_' + currentRoom, JSON.stringify(snapshot));
}

function restoreLocalState() {
  if (!currentRoom) return;
  const raw = localStorage.getItem('hd2_state_' + currentRoom);
  if (!raw) return;
  try {
    const snapshot = JSON.parse(raw);

    // Restore pod states and re-render UI
    for (let i = 1; i <= 4; i++) {
      if (!snapshot.podStates[i]) continue;
      const saved = snapshot.podStates[i];

      // Restore loadout checkboxes
      const panel = document.getElementById('panel-' + i + '-loadout');
      if (panel) {
        panel.querySelectorAll('input[type="checkbox"]').forEach(cb => {
          const cat = cb.dataset.cat;
          if (cat && saved.loadout[cat] !== undefined) {
            cb.checked = saved.loadout[cat];
            podStates[i].loadout[cat] = saved.loadout[cat];
          }
        });
      }

      // Restore warbond selections
      const wbPanel = document.getElementById('panel-' + i + '-warbonds');
      if (wbPanel && saved.warbonds) {
        const btns = wbPanel.querySelectorAll('.warbond-btn');
        btns.forEach((btn, idx) => {
          const wbId = WARBONDS[idx].id;
          if (saved.warbonds[wbId] !== undefined) {
            podStates[i].warbonds[wbId] = saved.warbonds[wbId];
            btn.classList.toggle('selected', saved.warbonds[wbId]);
            (WARBOND_ITEMS[wbId] || []).forEach(itemName => lockItemByName(i, itemName, !saved.warbonds[wbId]));
          }
        });
        updateTabCounts(i);
      }

      // Restore results and lock states
      if (snapshot.lastResults[i]) {
        lastResults[i] = snapshot.lastResults[i];
        lockedSlots[i] = new Set(snapshot.lockedSlots[i] || []);
        renderResult(i, snapshot.lastResults[i]);
      }

      // Restore claim display
      if (snapshot.currentClaims[i]) {
        currentClaims[i] = snapshot.currentClaims[i];
        updateClaimDisplay(i, snapshot.currentClaims[i]);
      }
    }

    // Restore trait filters
    if (snapshot.traitFilters) {
      Object.assign(traitFilters, snapshot.traitFilters);
      document.querySelectorAll('[onchange*="toggleTraitFilter"]').forEach(cb => {
        const m = cb.getAttribute('onchange').match(/'(\w+)'/);
        if (m && traitFilters[m[1]] !== undefined) cb.checked = traitFilters[m[1]];
      });
    }

    // Restore guaranteed stratagems
    if (snapshot.guaranteedStratagems) {
      guaranteedStratagems.clear();
      snapshot.guaranteedStratagems.forEach(s => guaranteedStratagems.add(s));
      const count = guaranteedStratagems.size;
      const countEl = document.getElementById('guaranteed-count');
      if (countEl) countEl.textContent = count ? `(${count} selected)` : '';
    }

    // Re-sync claims back to Firebase so everyone sees the user in their hellpod
    if (snapshot.currentClaims) {
      for (let i = 1; i <= 4; i++) {
        if (snapshot.currentClaims[i]) {
          if (window.syncClaim) window.syncClaim(i, false, snapshot.currentClaims[i]);
        }
      }
    }
    // Clear the restore flag so Firebase listeners resume normal operation
    window._pendingRestore = null;

    // Restore preset dropdown selections
    if (snapshot.presetSelections) {
      for (let i = 1; i <= 4; i++) {
        const sel = document.getElementById('preset-select-' + i);
        if (sel && snapshot.presetSelections[i]) {
          sel.value = snapshot.presetSelections[i];
        }
      }
    }
  } catch(e) {
    console.warn('Failed to restore local state:', e);
  }
}

function clearLocalState() {
  if (currentRoom) localStorage.removeItem('hd2_state_' + currentRoom);
}

// Hook saveLocalState into all sync actions
const _origSyncPodResult = window.syncPodResult;
window.syncPodResult = function(podId, result) { saveLocalState(); _origSyncPodResult?.(podId, result); };
const _origSyncAllResults = window.syncAllResults;
window.syncAllResults = function(results) { saveLocalState(); _origSyncAllResults?.(results); };
const _origSyncWarbonds = window.syncWarbonds;
window.syncWarbonds = function(podId) { saveLocalState(); _origSyncWarbonds?.(podId); };
const _origSyncClaim = window.syncClaim;
window.syncClaim = function(podId, clear, callsign) { saveLocalState(); _origSyncClaim?.(podId, clear, callsign); };

// Clear saved state on clean leave
const _origLeaveRoom = window.leaveRoom;
window.leaveRoom = function() { clearLocalState(); _origLeaveRoom?.(); };

// Best-effort clear of room state when tab closes (reliable on desktop, not guaranteed on mobile)
window.addEventListener('beforeunload', () => {
  clearLocalState();
});
// When screen wakes, refresh Firebase presence before onDisconnect fires
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState !== 'visible' || !currentRoom) return;
  if (myPresenceRef) {
    try {
      const callsign = document.getElementById('callsign-input')?.value.trim()
        || localStorage.getItem('hd2_callsign') || 'Helldiver';
      await set(myPresenceRef, { joined: Date.now(), callsign });
      onDisconnect(myPresenceRef).remove();
      touchActivity();
      // Re-sync claims in case onDisconnect partially fired
      for (let i = 1; i <= 4; i++) {
        if (currentClaims[i] && window.syncClaim) window.syncClaim(i, false, currentClaims[i]);
      }
    } catch {
      // Connection dropped fully — do a full rejoin and restore state
      const code = currentRoom;
      currentRoom = null;
      document.getElementById('room-input').value = code;
      window._pendingRestore = localStorage.getItem('hd2_state_' + code);
      await window.joinRoom();
      // Give Firebase listeners 1.5s to settle, then restore and re-sync
      setTimeout(() => {
        restoreLocalState();
      }, 1500);
    }
  }
});
</script>
